<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial - Repositor Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F58220">
    <style>
        :root { --laranja: #F58220; --azul: #005BAA; --verde: #39BC3E; --vermelho: #E12D2D; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .header { background: var(--laranja); color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; margin: -10px -10px 15px -10px; }
        #busca { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .produto-card { background: white; border-radius: 15px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; border-left: 6px solid var(--azul); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .img-box { width: 80px; height: 80px; min-width: 80px; background: white; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; border-radius: 8px; }
        .img-box img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .calc-area { background: #fff9f4; padding: 10px; border-radius: 10px; border: 1px solid #ffe0b2; }
        .input-group { display: flex; gap: 8px; }
        input[type="number"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 18px; text-align: center; }
        button { background: var(--verde); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .res { text-align: center; font-weight: bold; margin-top: 10px; min-height: 1.2em; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header"><h2>🛒 Mundial Reposição</h2></div>
    <input type="text" id="busca" placeholder="🔍 Buscar produto..." onkeyup="filtrar()">
    <div id="lista"></div>

    <script>
        const produtos = [
            { "nome": "ALHO TRITURADO OKKER 1KG", "cx": 6, "max": 18, "img": "https://mundial-api.supermercadosmundial.com.br/products/070359/300x300.webp" },
            { "nome": "ARROZ TIO MINGOTE BRANCO 5 KG", "cx": 6, "max": 60, "img": "https://mundial-api.supermercadosmundial.com.br/products/060864/300x300.webp" },
            { "nome": "CEREAL SNOW FLAKES", "cx": 12, "max": 24, "img": "https://mundial-api.supermercadosmundial.com.br/products/070308/300x300.webp" },
            { "nome": "Azeitonas Pretas VALE FÉRTIL 160g/200g", "cx": 12, "max": 48, "img": "https://mundial-api.supermercadosmundial.com.br/products/044554/300x300.webp" },
            { "nome": "AZEITE DE DENDE CEPERA VD 200ML", "cx": 12, "max": 36, "img": "https://mundial-api.supermercadosmundial.com.br/products/069785/300x300.webp" },
            { "nome": "ÓLEO DE GIRASSOL SINHÁ 900ML", "cx": 20, "max": 100, "img": "https://mundial-api.supermercadosmundial.com.br/products/021893/300x300.webp" },
            { "nome": "AVEIA QUAKER FLOCOS FINOS 450G", "cx": 12, "max": 48, "img": "https://mundial-api.supermercadosmundial.com.br/products/062721/300x300.webp" },
            { "nome": "Alcaparras VALE FÉRTIL Vidro 60g", "cx": 12, "max": 24, "img": "https://mundial-api.supermercadosmundial.com.br/products/060455/300x300.webp" },
            { "nome": "Maionese HEMMER Receita Caseira 500g", "cx": 12, "max": 36, "img": "https://mundial-api.supermercadosmundial.com.br/products/075035/300x300.webp" },
            { "nome": "GRÃO-DE-BICO GRANFINO 500G", "cx": 10, "max": 40, "img": "https://mundial-api.supermercadosmundial.com.br/products/011848/300x300.webp" },
            { "nome": "LENTILHA VAPZA 250G", "cx": 12, "max": 36, "img": "https://mundial-api.supermercadosmundial.com.br/products/059923/300x300.webp" },
            { "nome": "Leite de Coco COPRA 500ml", "cx": 12, "max": 48, "img": "https://mundial-api.supermercadosmundial.com.br/products/068474/300x300.webp" },
            { "nome": "FEIJÃO VERMELHO D´NUVA 1 KG", "cx": 10, "max": 50, "img": "https://mundial-api.supermercadosmundial.com.br/products/065593/300x300.webp" },
            { "nome": "LEITE COND. MOÇA LATA 395G", "cx": 24, "max": 96, "img": "https://mundial-api.supermercadosmundial.com.br/products/071738/300x300.webp" },
            { "nome": "ATUM RALADO COQUEIRO 170G", "cx": 24, "max": 96, "img": "https://mundial-api.supermercadosmundial.com.br/products/021370/300x300.webp" },
            { "nome": "Lentilha GRANFINO 500g", "cx": 10, "max": 40, "img": "https://mundial-api.supermercadosmundial.com.br/products/011847/300x300.webp" },
            { "nome": "Leite de Coco SOCOCO 200ml", "cx": 24, "max": 72, "img": "https://mundial-api.supermercadosmundial.com.br/products/004665/300x300.webp" },
            { "nome": "COCO RALADO SOCOCO 100G", "cx": 24, "max": 48, "img": "https://mundial-api.supermercadosmundial.com.br/products/017304/300x300.webp" }
        ];

        function carregar(itens) {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            itens.forEach(p => {
                lista.innerHTML += `
                    <div class="produto-card">
                        <div class="info">
                            <div class="img-box"><img src="${p.img}"></div>
                            <div class="detalhes">
                                <h3>${p.nome}</h3>
                                <p style="font-size:11px; color:#666">Cx: ${p.cx} un | Max: ${p.max} un</p>
                            </div>
                        </div>
                        <div class="calc-area">
                            <div class="input-group">
                                <input type="number" id="in-${p.nome}" placeholder="Qtd na gôndola" inputmode="numeric">
                                <button onclick="calc('${p.nome}', ${p.max}, ${p.cx})">OK</button>
                            </div>
                            <div id="res-${p.nome}" class="res"></div>
                        </div>
                    </div>`;
            });
        }
        function filtrar() {
            const t = document.getElementById('busca').value.toLowerCase();
            carregar(produtos.filter(p => p.nome.toLowerCase().includes(t)));
        }
        function calc(nome, max, cx) {
            const q = parseInt(document.getElementById(`in-${nome}`).value);
            const r = document.getElementById(`res-${nome}`);
            if(isNaN(q)) return;
            const f = max - q;
            if(f <= 0) { r.innerHTML = "<span style='color:green'>CHEIO! ✅</span>"; }
            else { 
                const cxf = Math.floor(f/cx); const av = f % cx;
                r.innerHTML = `<span style='color:red'>PEGAR: ${cxf} CX e ${av} UN</span>`;
            }
        }
        carregar(produtos);
    </script>
</body>
</html>
